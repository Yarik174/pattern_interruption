services:
  - type: web
    name: nhl-web-predictor
    runtime: python
    region: oregon  # выберите ближайший: oregon, frankfurt, singapore, ohio
    plan: free      # или starter, standard и т.д.
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    healthCheckPath: /
    envVars:
      - key: SESSION_SECRET
        generateValue: true        # Render сгенерирует случайное значение
      - key: DATABASE_URL
        fromDatabase:
          name: nhl-predictor-db
          property: connectionString
      # Заполните вручную в Render Dashboard → Environment:
      - key: RAPIDAPI_KEY
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: ALLBESTBETS_API_TOKEN
        sync: false
      - key: ALLBESTBETS_FILTER_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

databases:
  - name: nhl-predictor-db
    databaseName: nhlpredictor
    user: nhlpredictor
    plan: free   # PostgreSQL на Render (free: 1 GB, 90 дней → потом платный)
