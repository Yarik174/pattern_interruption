server {
    listen 80;
    server_name _;  # замени на IP или домен, например: 185.xxx.xxx.xxx

    # Логи
    access_log /var/log/nginx/pattern_access.log;
    error_log  /var/log/nginx/pattern_error.log;

    # Лимиты
    client_max_body_size 10M;

    # Статические файлы — отдаём напрямую через Nginx (быстрее Gunicorn)
    location /static/ {
        alias /opt/pattern_interruption/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Всё остальное — проксируем на Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # WebSocket support (на случай если понадобится)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
