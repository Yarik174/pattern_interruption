<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <title>Hockey Pattern Predictor</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #252542;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255,255,255,0.08);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-stats {
            display: flex;
            gap: 24px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-light);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tabs-container {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .tab {
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tab:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .tab-badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        
        .filters-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            gap: 4px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: var(--bg-card);
        }
        
        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .refresh-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }
        
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .refresh-btn.loading .refresh-icon {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        
        .match-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--border);
        }
        
        .match-card.signal-high::before {
            background: linear-gradient(90deg, var(--success), var(--accent));
        }
        
        .match-card.signal-medium::before {
            background: var(--warning);
        }
        
        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .match-time {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .score-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        
        .score-high {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .score-medium {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }
        
        .score-low {
            background: rgba(255,255,255,0.1);
            color: var(--text-muted);
        }
        
        .teams-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px 0;
        }
        
        .team-block {
            flex: 1;
            text-align: center;
        }
        
        .team-abbr {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        .team-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .vs-divider {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        
        .patterns-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .pattern-box {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 12px;
        }
        
        .pattern-box h4 {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .pattern-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .pattern-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
        }
        
        .pattern-tag.critical {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        
        .pattern-tag.positive {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .prediction-bar {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .prediction-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .prediction-value {
            font-weight: 700;
            font-size: 1rem;
        }
        
        .prediction-value.break {
            color: var(--danger);
        }
        
        .prediction-value.continue {
            color: var(--success);
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .progress-fill.break {
            background: linear-gradient(90deg, var(--danger), var(--warning));
        }
        
        .progress-fill.continue {
            background: linear-gradient(90deg, var(--accent), var(--success));
        }
        
        .odds-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        
        .odds-item {
            text-align: center;
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
        }
        
        .odds-team {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .odds-value {
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        .ev-badge {
            grid-column: span 3;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }
        
        .ev-badge.positive {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(99, 102, 241, 0.2));
            color: var(--success);
        }
        
        .ev-badge.negative {
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
        }
        
        .loading-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .info-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            margin-top: 32px;
            border: 1px solid var(--border);
        }
        
        .info-card h3 {
            font-size: 1rem;
            margin-bottom: 16px;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }
        
        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 10px;
        }
        
        .info-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }
        
        .info-icon.green { background: rgba(16, 185, 129, 0.2); }
        .info-icon.yellow { background: rgba(245, 158, 11, 0.2); }
        .info-icon.red { background: rgba(239, 68, 68, 0.2); }
        .info-icon.purple { background: rgba(99, 102, 241, 0.2); }
        
        .info-text strong {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 2px;
        }
        
        .info-text span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .app {
                padding: 12px;
            }
            
            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            
            .header-stats {
                justify-content: center;
            }
            
            .matches-grid {
                grid-template-columns: 1fr;
            }
            
            .filters-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                justify-content: center;
            }
            
            .refresh-btn {
                margin: 0;
                justify-content: center;
            }
            
            .tabs-container {
                justify-content: flex-start;
            }
            
            .patterns-grid {
                grid-template-columns: 1fr;
            }
            
            .odds-section {
                grid-template-columns: 1fr 1fr;
            }
            
            .ev-badge {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo">
                <div class="logo-icon">🏒</div>
                <h1>Pattern Predictor</h1>
            </div>
            <div class="header-stats" id="headerStats">
                <div class="stat-item">
                    <div class="stat-value" id="matchCount">-</div>
                    <div class="stat-label">Матчей</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="signalCount">-</div>
                    <div class="stat-label">Сигналов</div>
                </div>
            </div>
        </header>
        
        <div class="tabs-container" id="leagueTabs">
            <button class="tab active" data-league="nhl">
                🇺🇸 NHL
                <span class="tab-badge" id="nhl-count">0</span>
            </button>
            <button class="tab" data-league="khl">
                🇷🇺 KHL
                <span class="tab-badge" id="khl-count">0</span>
            </button>
            <button class="tab" data-league="shl">
                🇸🇪 SHL
                <span class="tab-badge" id="shl-count">0</span>
            </button>
            <button class="tab" data-league="liiga">
                🇫🇮 Liiga
                <span class="tab-badge" id="liiga-count">0</span>
            </button>
            <button class="tab" data-league="del">
                🇩🇪 DEL
                <span class="tab-badge" id="del-count">0</span>
            </button>
        </div>
        
        <div class="filters-bar">
            <div class="filter-group">
                <button class="filter-btn" data-score="0">Все</button>
                <button class="filter-btn" data-score="3">Score 3+</button>
                <button class="filter-btn active" data-score="4">Score 4+</button>
                <button class="filter-btn" data-score="5">Score 5+</button>
            </div>
            <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
                <span class="refresh-icon">↻</span>
                Обновить
            </button>
        </div>
        
        <div id="matchesContainer">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Загрузка матчей...</p>
            </div>
        </div>
        
        <div class="info-card">
            <h3>📊 Как читать сигналы</h3>
            <div class="info-list">
                <div class="info-item">
                    <div class="info-icon green">📈</div>
                    <div class="info-text">
                        <strong>Score 4-6</strong>
                        <span>Сильный сигнал прерывания, точность 50%+</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon yellow">🔄</div>
                    <div class="info-text">
                        <strong>Синергия</strong>
                        <span>Несколько критических паттернов сразу</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon red">⚡</div>
                    <div class="info-text">
                        <strong>Чередование</strong>
                        <span>Паттерн W-L-W-L достиг критической длины</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon purple">💰</div>
                    <div class="info-text">
                        <strong>EV > 0</strong>
                        <span>Ставка математически выгодна</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const state = {
            currentLeague: 'nhl',
            minScore: 4,
            nhlMatches: [],
            multiLeagueData: {},
            loading: false
        };
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                state.currentLeague = tab.dataset.league;
                renderMatches();
            });
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.minScore = parseInt(btn.dataset.score);
                renderMatches();
            });
        });
        
        async function loadAllData() {
            state.loading = true;
            updateRefreshButton();
            showLoading();
            
            try {
                const nhlResponse = await fetch('/api/analyze-all');
                const nhlData = await nhlResponse.json();
                state.nhlMatches = nhlData.matches || [];
                
                updateTabCounts();
                updateHeaderStats();
                renderMatches();
                
                fetch('/api/multi-league/upcoming')
                    .then(r => r.json())
                    .then(data => {
                        state.multiLeagueData = data.leagues || {};
                        updateTabCounts();
                        updateHeaderStats();
                        if (state.currentLeague !== 'nhl') {
                            renderMatches();
                        }
                    })
                    .catch(e => console.log('Multi-league error:', e));
                    
            } catch (error) {
                showError(error.message);
            } finally {
                state.loading = false;
                updateRefreshButton();
            }
        }
        
        function refreshData() {
            loadAllData();
        }
        
        function updateRefreshButton() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = state.loading;
            btn.classList.toggle('loading', state.loading);
        }
        
        function updateTabCounts() {
            const nhlFiltered = state.nhlMatches.filter(m => m.strong_signal?.max >= 3).length;
            document.getElementById('nhl-count').textContent = nhlFiltered;
            
            ['khl', 'shl', 'liiga', 'del'].forEach(league => {
                const data = state.multiLeagueData[league.toUpperCase()] || {};
                const count = (data.matches || []).filter(m => (m.score || 0) >= 3).length;
                document.getElementById(`${league}-count`).textContent = count;
            });
        }
        
        function updateHeaderStats() {
            let totalMatches = state.nhlMatches.length;
            let signalMatches = state.nhlMatches.filter(m => m.strong_signal?.max >= 4).length;
            
            Object.values(state.multiLeagueData).forEach(league => {
                const matches = league.matches || [];
                totalMatches += matches.length;
                signalMatches += matches.filter(m => (m.score || 0) >= 4).length;
            });
            
            document.getElementById('matchCount').textContent = totalMatches;
            document.getElementById('signalCount').textContent = signalMatches;
        }
        
        function showLoading() {
            document.getElementById('matchesContainer').innerHTML = `
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Анализ матчей...</p>
                    <p style="font-size: 0.85rem; margin-top: 8px; color: var(--text-muted)">
                        Первая загрузка может занять минуту
                    </p>
                </div>
            `;
        }
        
        function showError(message) {
            document.getElementById('matchesContainer').innerHTML = `
                <div class="empty-state">
                    <h3>Ошибка загрузки</h3>
                    <p>${message}</p>
                </div>
            `;
        }
        
        function renderMatches() {
            const container = document.getElementById('matchesContainer');
            let matches = [];
            
            if (state.currentLeague === 'nhl') {
                matches = state.nhlMatches
                    .filter(m => (m.strong_signal?.max || 0) >= state.minScore)
                    .map(m => formatNHLMatch(m));
            } else {
                const leagueData = state.multiLeagueData[state.currentLeague.toUpperCase()] || {};
                matches = (leagueData.matches || [])
                    .filter(m => (m.score || 0) >= state.minScore)
                    .map(m => formatMultiLeagueMatch(m));
            }
            
            if (matches.length === 0) {
                const isMultiLeague = state.currentLeague !== 'nhl';
                const leagueHasData = isMultiLeague && state.multiLeagueData[state.currentLeague.toUpperCase()]?.matches?.length > 0;
                
                let message = '';
                if (isMultiLeague && !leagueHasData) {
                    message = `<h3>Нет данных для ${state.currentLeague.toUpperCase()}</h3>
                              <p>Для загрузки европейских лиг требуется API_SPORTS_KEY</p>`;
                } else {
                    message = `<h3>Нет матчей с score ≥ ${state.minScore}</h3>
                              <p>Попробуйте уменьшить порог фильтра или выбрать другую лигу</p>`;
                }
                
                container.innerHTML = `<div class="empty-state">${message}</div>`;
                return;
            }
            
            container.innerHTML = `<div class="matches-grid">${matches.map(renderMatchCard).join('')}</div>`;
        }
        
        function formatNHLMatch(m) {
            return {
                home: m.home_team,
                away: m.away_team,
                score: m.strong_signal?.max || 0,
                time: m.game_info?.time,
                homePatterns: m.patterns?.home || {},
                awayPatterns: m.patterns?.away || {},
                prediction: m.prediction,
                odds: m.odds
            };
        }
        
        function formatMultiLeagueMatch(m) {
            return {
                home: m.home,
                away: m.away,
                score: m.score || 0,
                time: null,
                homePatterns: {
                    win_streak: m.home_streak || 0,
                    overall_streak: m.home_streak || 0,
                    synergy: m.home_synergy || 0,
                    alternation_combo: m.home_alt || 0
                },
                awayPatterns: {
                    win_streak: m.away_streak || 0,
                    overall_streak: m.away_streak || 0,
                    synergy: m.away_synergy || 0,
                    alternation_combo: m.away_alt || 0
                },
                prediction: m.break_probability ? {
                    break_probability: m.break_probability,
                    continue_probability: 100 - m.break_probability,
                    recommendation: m.break_probability >= 50 ? 'ПРЕРЫВАНИЕ' : 'ПРОДОЛЖЕНИЕ'
                } : null,
                odds: m.odds
            };
        }
        
        function renderMatchCard(match) {
            const scoreClass = match.score >= 5 ? 'score-high' : (match.score >= 3 ? 'score-medium' : 'score-low');
            const cardClass = match.score >= 4 ? 'signal-high' : (match.score >= 3 ? 'signal-medium' : '');
            
            const timeStr = match.time ? new Date(match.time).toLocaleString('ru-RU', {
                day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
            }) : '';
            
            const pred = match.prediction;
            const isBreak = pred && pred.break_probability >= 50;
            
            return `
                <div class="match-card ${cardClass}">
                    <div class="match-header">
                        <div class="match-time">
                            ${timeStr ? `📅 ${timeStr}` : ''}
                        </div>
                        <div class="score-indicator ${scoreClass}">
                            ⚡ Score: ${match.score}
                        </div>
                    </div>
                    
                    <div class="teams-display">
                        <div class="team-block">
                            <div class="team-abbr">${match.away}</div>
                            <div class="team-label">Гости</div>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="team-block">
                            <div class="team-abbr">${match.home}</div>
                            <div class="team-label">Дома</div>
                        </div>
                    </div>
                    
                    <div class="patterns-grid">
                        <div class="pattern-box">
                            <h4>${match.home} (дома)</h4>
                            <div class="pattern-stats">
                                ${renderPatternTags(match.homePatterns)}
                            </div>
                        </div>
                        <div class="pattern-box">
                            <h4>${match.away} (гости)</h4>
                            <div class="pattern-stats">
                                ${renderPatternTags(match.awayPatterns)}
                            </div>
                        </div>
                    </div>
                    
                    ${pred ? `
                    <div class="prediction-bar">
                        <div class="prediction-header">
                            <span class="prediction-label">Прогноз</span>
                            <span class="prediction-value ${isBreak ? 'break' : 'continue'}">
                                ${pred.recommendation} ${isBreak ? pred.break_probability : pred.continue_probability}%
                            </span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${isBreak ? 'break' : 'continue'}" 
                                 style="width: ${isBreak ? pred.break_probability : pred.continue_probability}%"></div>
                        </div>
                    </div>
                    ` : ''}
                    
                    ${match.odds ? renderOdds(match) : ''}
                </div>
            `;
        }
        
        function renderPatternTags(patterns) {
            const tags = [];
            
            const streak = patterns.overall_streak || patterns.win_streak || 0;
            if (streak !== 0) {
                const cls = Math.abs(streak) >= 5 ? 'critical' : '';
                tags.push(`<span class="pattern-tag ${cls}">Серия: ${streak > 0 ? '+' : ''}${streak}</span>`);
            }
            
            if (patterns.synergy >= 2) {
                tags.push(`<span class="pattern-tag critical">Синергия: ${patterns.synergy}</span>`);
            }
            
            if (patterns.alternation_combo >= 1) {
                tags.push(`<span class="pattern-tag critical">Чередование</span>`);
            }
            
            if (patterns.overgrowth >= 1) {
                tags.push(`<span class="pattern-tag critical">Перерост</span>`);
            }
            
            if (tags.length === 0) {
                tags.push(`<span class="pattern-tag">Нет критических</span>`);
            }
            
            return tags.join('');
        }
        
        function renderOdds(match) {
            const odds = match.odds;
            return `
                <div class="odds-section">
                    <div class="odds-item">
                        <div class="odds-team">${match.home}</div>
                        <div class="odds-value">${odds.home?.toFixed(2) || '-'}</div>
                    </div>
                    <div class="odds-item">
                        <div class="odds-team">Ничья</div>
                        <div class="odds-value">-</div>
                    </div>
                    <div class="odds-item">
                        <div class="odds-team">${match.away}</div>
                        <div class="odds-value">${odds.away?.toFixed(2) || '-'}</div>
                    </div>
                    ${odds.ev !== undefined ? `
                    <div class="ev-badge ${odds.profitable ? 'positive' : 'negative'}">
                        ${odds.reasoning || ''}<br>
                        EV: ${odds.profitable ? '+' : ''}${odds.ev}% ${odds.profitable ? '✓ ВЫГОДНО' : ''}
                    </div>
                    ` : ''}
                </div>
            `;
        }
        
        document.addEventListener('DOMContentLoaded', loadAllData);
    </script>
</body>
</html>
